<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Спасибо</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    height: 100%;
    overflow-x: hidden;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
    background: #f8f9fc;
  }
  body {
    min-height: 100vh;
    background: #f8f9fc;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overscroll-behavior-y: none;
  }

  /* ── Сцена ── */
  .block {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    overflow: hidden;
    isolation: isolate;
    --mouse-x: 50%;
    --mouse-y: 50%;
  }

  /* ── Шапка ── */
  .theme {
    position: absolute;
    top: clamp(2rem, 7vh, 5rem);
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    font-size: clamp(.6rem, .9vw, .78rem);
    letter-spacing: .45em;
    text-transform: uppercase;
    color: rgba(30,30,40,.42);
    white-space: nowrap;
    font-weight: 500;
  }
  .theme .num { margin-right: .7em; color: rgba(30,30,40,.28); }

  /* ── Жидкие блобы ── */
  .blob-field {
    position: absolute; inset: -15%; z-index: 0;
    filter: blur(88px) saturate(1.15);
    opacity: .92; pointer-events: none;
    animation: hue-drift 22s ease-in-out infinite alternate;
  }
  @keyframes hue-drift {
    0%   { filter: blur(88px) saturate(1.1)  hue-rotate(0deg);  }
    50%  { filter: blur(92px) saturate(1.3)  hue-rotate(18deg); }
    100% { filter: blur(88px) saturate(1.15) hue-rotate(-12deg); }
  }
  .blob {
    position: absolute; width: 55vmax; height: 55vmax;
    border-radius: 50%; opacity: .6; will-change: transform;
  }
  .blob.b1{background:var(--c1);top:-20%;left:-15%;animation:d1 26s ease-in-out infinite alternate}
  .blob.b2{background:var(--c2);top:10%;right:-20%;animation:d2 30s ease-in-out infinite alternate}
  .blob.b3{background:var(--c3);bottom:-25%;left:20%;animation:d3 34s ease-in-out infinite alternate}
  .blob.b4{background:var(--c4);bottom:5%;right:15%;animation:d4 28s ease-in-out infinite alternate}
  .blob.b5{background:var(--c5);top:35%;left:35%;width:40vmax;height:40vmax;animation:d5 22s ease-in-out infinite alternate;opacity:.45}
  @keyframes d1{0%{transform:translate(0,0) scale(1)}50%{transform:translate(15vw,20vh) scale(1.25)}100%{transform:translate(35vw,8vh) scale(1.1)}}
  @keyframes d2{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-20vw,15vh) scale(1.15)}100%{transform:translate(-30vw,35vh) scale(1.3)}}
  @keyframes d3{0%{transform:translate(0,0) scale(1.1)}50%{transform:translate(25vw,-20vh) scale(1.3)}100%{transform:translate(-10vw,-35vh) scale(1.2)}}
  @keyframes d4{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-15vw,-25vh) scale(1.2)}100%{transform:translate(-35vw,-10vh) scale(1.05)}}
  @keyframes d5{0%{transform:translate(0,0) scale(1)}50%{transform:translate(20vw,25vh) scale(1.4)}100%{transform:translate(-15vw,30vh) scale(1.15)}}

  .block::after {
    content:''; position:absolute; inset:0;
    background: radial-gradient(circle 32vmin at var(--mouse-x) var(--mouse-y), var(--c-accent) 0%, transparent 45%);
    opacity:.18; pointer-events:none; z-index:1; mix-blend-mode:multiply;
  }

  /* ── Барабан (блоки 1–3) ── */
  .stage {
    position: relative; z-index: 2;
    width: 100%; text-align: center; padding: 0 1.5rem;
    font-size: clamp(3.5rem, 13vw, 13rem);
    height: 1.2em;
    perspective: 520px; perspective-origin: 50% 50%;
  }
  .block.multi .stage {
    font-size: clamp(2.8rem, 9.5vw, 9.5rem);
    height: 4em;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 82%, transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 82%, transparent 100%);
  }
  .word-stack {
    position: absolute; left: 0; right: 0;
    height: 1.15em; top: calc(50% - 0.575em);
    display: flex; align-items: center; justify-content: center;
    will-change: transform, opacity;
    transition: transform .65s cubic-bezier(.16,1,.3,1), opacity .55s ease;
  }
  .lang {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
    font-weight: 200; letter-spacing: -.04em; line-height: 1.05;
    white-space: nowrap; font-size: 1em;
    background-image: linear-gradient(var(--text-angle,110deg), var(--t1),var(--t2),var(--t3),var(--t4),var(--t5));
    -webkit-background-clip: text; background-clip: text;
    color: transparent; -webkit-text-fill-color: transparent;
    opacity: 0; transition: opacity .65s ease;
  }
  .lang.active { opacity: 1; transition: opacity .75s ease; }
  .lang.wrap   { white-space: normal; }

  @media (max-width: 720px) {
    .stage { font-size: clamp(2.2rem, 12vw, 5rem); }
    .block.multi .stage { font-size: clamp(2rem, 10vw, 4rem); }
  }
  @media (prefers-reduced-motion: reduce) {
    .blob { animation: none; }
    .blob-field { animation: none; filter: blur(88px) saturate(1.1); }
    .lang { transition: opacity .3s ease; }
    .word-stack { transition: none; }
    html { scroll-behavior: auto; }
  }

  /* ── Финальный блок ── */
  .final-block {
    flex-direction: column; justify-content: center;
    gap: clamp(2rem,5vh,4rem); padding: 7vh 0 4vh;
  }
  .final-block .blob-field { filter: blur(55px) saturate(1.35); opacity: 1; animation-duration: 14s; }
  .glass-veil {
    position: absolute; inset: 0; z-index: 1;
    background: rgba(248,249,252,.28);
    backdrop-filter: blur(14px) saturate(1.6);
    -webkit-backdrop-filter: blur(14px) saturate(1.6);
  }
  .final-msg { z-index:2; text-align:center; padding:0 2rem; display:flex; flex-direction:column; align-items:center; gap:.75rem; }
  .final-eyebrow { font-size:clamp(.65rem,1vw,.8rem); letter-spacing:.45em; text-transform:uppercase; color:rgba(30,30,40,.4); font-weight:500; }
  .final-title {
    font-size: clamp(2.5rem,6.5vw,5.5rem);
    font-weight: 200; letter-spacing: -.04em; line-height: 1.08;
    background-image: linear-gradient(110deg,#ee6c4d,#fb8500,#ffd700,#06a77d,#3a86ff,#8338ec,#ff006e);
    -webkit-background-clip: text; background-clip: text;
    color: transparent; -webkit-text-fill-color: transparent;
  }
  .final-sub { font-size:clamp(.95rem,1.7vw,1.25rem); font-weight:300; color:rgba(30,30,40,.65); max-width:34rem; line-height:1.65; }

  /* ── Бегущая строка ── */
  .marquee-zone { z-index:2; width:100%; display:flex; flex-direction:column; gap:clamp(.7rem,1.4vh,1.2rem); }
  .marquee-row {
    width:100%; overflow:hidden;
    -webkit-mask-image: linear-gradient(to right,transparent 0%,#000 10%,#000 90%,transparent 100%);
    mask-image: linear-gradient(to right,transparent 0%,#000 10%,#000 90%,transparent 100%);
  }
  .marquee-track { display:inline-flex; align-items:center; gap:2rem; white-space:nowrap; width:max-content; padding:.15rem 0; }
  .marquee-track.l1{animation:mql 52s linear infinite}
  .marquee-track.l2{animation:mqr 40s linear infinite}
  .marquee-track.l3{animation:mql 70s linear infinite}
  .marquee-track.l4{animation:mqr 46s linear infinite}
  @keyframes mql{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @keyframes mqr{from{transform:translateX(-50%)}to{transform:translateX(0)}}
  .mq-word { font-size:clamp(1.1rem,2.2vw,1.7rem); font-weight:300; letter-spacing:-.01em; color:rgba(30,30,40,.78); flex-shrink:0; }
  .mq-word.dim { color:rgba(30,30,40,.44); }
  .mq-word[data-f] { font-style:italic; color:rgba(30,30,40,.58); }
  .mq-word[data-f][lang="ja"] { font-style:normal; }
  .mq-sep { color:rgba(30,30,40,.18); font-size:.55em; flex-shrink:0; }

  /* ── Nav ── */
  .scroll-hint{position:fixed;bottom:1.75rem;left:50%;transform:translateX(-50%);color:rgba(30,30,40,.45);font-size:.7rem;letter-spacing:.35em;text-transform:uppercase;z-index:10;animation:sh 2.4s ease-in-out infinite;pointer-events:none;transition:opacity .6s ease}
  @keyframes sh{0%,100%{transform:translate(-50%,0);opacity:.45}50%{transform:translate(-50%,-8px);opacity:.85}}
  .nav-dots{position:fixed;top:50%;right:1.25rem;transform:translateY(-50%);display:flex;flex-direction:column;gap:.55rem;z-index:10}
  .nav-dots button{width:6px;height:6px;border-radius:50%;border:0;background:rgba(30,30,40,.18);cursor:pointer;padding:0;transition:background .3s,transform .3s}
  .nav-dots button.current{background:rgba(30,30,40,.65);transform:scale(1.6)}
  @media(max-width:720px){.nav-dots{display:none}}

  /* ── Fuji Water Block ── */
  .fuji-block { background:#1a2535; }
  .fuji-bg { position:absolute; inset:0; z-index:0; background:center/cover no-repeat; }
  .fuji-petal-canvas { position:absolute; inset:0; z-index:2; pointer-events:none; }
  .fuji-haiku { position:absolute; bottom:9%; left:8%; z-index:3; pointer-events:none; }
  .fuji-haiku .h-line {
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
    font-size:clamp(2.2rem,4.8vw,4.2rem); font-weight:300;
    color:rgba(255,255,255,.92); line-height:1.3; letter-spacing:-.02em; margin:0;
    text-shadow:0 2px 24px rgba(0,20,60,.45);
    animation:hk-bob 4.5s cubic-bezier(.37,0,.63,1) infinite;
  }
  .fuji-haiku .h-line:nth-child(1){ animation-delay:0s; }
  .fuji-haiku .h-line:nth-child(2){ animation-delay:.65s; }
  .fuji-haiku .h-line:nth-child(3){ animation-delay:1.3s; }
  @keyframes hk-bob { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-9px); } }
  .fuji-haiku .h-author {
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
    font-size:clamp(.8rem,1.2vw,1rem); font-weight:300; color:rgba(255,255,255,.5);
    margin-top:1.1rem; letter-spacing:.13em; text-shadow:0 1px 10px rgba(0,0,0,.4);
  }

  /* ══════════════════════════════════════════════════════
     DRUM BLOCK — игровой барабан из 4-х секций
     ══════════════════════════════════════════════════════ */
  .drum-block { flex-direction: column; }

  /* плавный тинт при смене слова */
  .drum-tint {
    position: absolute; inset: 0; z-index: 0;
    opacity: .30; pointer-events: none;
    transition: background 1.8s ease;
  }

  /* drum-frame — только держит viewport, центрируется блоком */
  .drum-frame {
    position: relative; z-index: 2;
    width: 100%;
  }

  /* bottom panel — абсолютная позиция над подсказкой */
  .drum-bottom {
    position: absolute;
    bottom: clamp(4.5rem, 9vh, 7rem);
    left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center;
    gap: .65rem;
    z-index: 3;
  }

  /* 4-секционный цилиндр */
  .drum-viewport {
    position: relative;
    width: 100%;
    font-size: clamp(3rem, 11vw, 10.5rem);
    height: calc(4 * 1.15em);
    perspective: 560px;
    perspective-origin: 50% 50%;
    -webkit-mask-image: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(0,0,0,.5) 8%,
      black 24%,
      black 76%,
      rgba(0,0,0,.5) 92%,
      transparent 100%
    );
    mask-image: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(0,0,0,.5) 8%,
      black 24%,
      black 76%,
      rgba(0,0,0,.5) 92%,
      transparent 100%
    );
    overflow: visible;
  }

  .drum-slot {
    position: absolute; left: 0; right: 0;
    height: 1.15em;
    top: calc(50% - 0.575em);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
    font-weight: 200; letter-spacing: -.04em; line-height: 1.05;
    white-space: nowrap;
    background-image: linear-gradient(110deg, var(--t1),var(--t2),var(--t3),var(--t4),var(--t5));
    -webkit-background-clip: text; background-clip: text;
    color: transparent; -webkit-text-fill-color: transparent;
    will-change: transform, opacity;
    transition: transform .58s cubic-bezier(.16,1,.3,1), opacity .48s ease;
  }

  /* перевод под барабаном */
  .drum-trans {
    font-size: clamp(1.05rem, 2.2vw, 1.8rem);
    font-weight: 300;
    color: rgba(30,30,40,.6);
    letter-spacing: .04em;
    text-align: center;
    padding: 0 2rem;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity .7s ease .25s, transform .7s ease .25s;
    position: relative; z-index: 2;
    min-height: 1.6em;
  }
  .drum-trans.vis { opacity: 1; transform: translateY(0); }

  /* точки-счётчик */
  .drum-dots {
    display: flex; gap: .6rem; align-items: center;
    position: relative; z-index: 2;
    opacity: 0; transition: opacity .5s ease;
  }
  .drum-dots.vis { opacity: 1; }
  .drum-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(30,30,40,.15);
    transition: background .4s ease, transform .4s cubic-bezier(.34,1.56,.64,1);
    flex-shrink: 0;
  }
  .drum-dot.on {
    background: rgba(30,30,40,.62);
    transform: scale(1.6);
  }

  /* кнопка */
  .drum-btn {
    padding: .68em 2.4em;
    border-radius: 100px;
    border: 1.5px solid rgba(30,30,40,.14);
    background: rgba(255,255,255,.26);
    backdrop-filter: blur(18px) saturate(1.6);
    -webkit-backdrop-filter: blur(18px) saturate(1.6);
    font-family: inherit;
    font-size: clamp(.72rem, 1.1vw, .88rem);
    font-weight: 400;
    color: rgba(30,30,40,.7);
    cursor: pointer;
    opacity: 0;
    transform: translateY(18px);
    transition: opacity .55s ease .1s, transform .55s cubic-bezier(.34,1.56,.64,1) .1s, background .2s;
    pointer-events: none;
    position: relative; z-index: 2;
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  .drum-btn.vis { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .drum-btn:hover { background: rgba(255,255,255,.52); }
  .drum-btn:active { transform: scale(.96); transition: transform .1s; }

  /* подсказка (пропадает после первого spin) */
  .drum-hint {
    position: absolute;
    bottom: clamp(1.8rem, 3.5vh, 3rem);
    left: 50%; transform: translateX(-50%);
    z-index: 3;
    font-size: clamp(.58rem, .82vw, .7rem);
    letter-spacing: .44em;
    text-transform: uppercase;
    color: rgba(30,30,40,.36);
    white-space: nowrap;
    font-weight: 500;
    transition: opacity .6s ease;
    pointer-events: none;
  }
  .drum-hint.gone { opacity: 0; }

  @media (max-width: 720px) {
    .drum-viewport { font-size: clamp(2.2rem, 12vw, 5rem); }
    .drum-trans { font-size: clamp(.85rem, 4vw, 1.2rem); }
  }
</style>
</head>
<script src="jquery.min.js"></script>

<script>
const langs     = ['ru', 'en', 'ja', 'fr'];
const TICK_MS   = 2000;
const SLOT_H_EM = 1.15;

const groups = [

    words:[

      {ru:'Добиваться',en:'Achieve',   ja:'成し遂げる',fr:'Accomplir'},

/* ── утилиты ── */
const app = document.getElementById('app');

function cursor(el){
  el.addEventListener('mousemove',e=>{
    const r=el.getBoundingClientRect();
    el.style.setProperty('--mouse-x',((e.clientX-r.left)/r.width*100)+'%');
    el.style.setProperty('--mouse-y',((e.clientY-r.top)/r.height*100)+'%');
  },{passive:true});
}
function blobField(){
  const f=document.createElement('div');f.className='blob-field';f.setAttribute('aria-hidden','true');
  ['b1','b2','b3','b4','b5'].forEach(c=>{const b=document.createElement('div');b.className='blob '+c;f.appendChild(b);});
  return f;
}
function setPal(el,g){
  g.tp.forEach((c,i)=>el.style.setProperty('--t'+(i+1),c));
  g.bp.forEach((c,i)=>el.style.setProperty('--c'+(i+1),c));
  el.style.setProperty('--c-accent',g.ac);
}
function makeWordStack(){
  const d=document.createElement('div');d.className='word-stack';
  langs.forEach(l=>{
    const s=document.createElement('span');s.className='lang';
    s.setAttribute('lang',l);s.dataset.lang=l;
    d.appendChild(s);
  });
  return d;
}
function setDrumPos(slot,pos,animate){
  if(!animate) slot.style.transition='none';
  const sc=pos===0?1:Math.abs(pos)===1?0.64:0.35;
  const op=pos===0?1:Math.abs(pos)===1?0.22:0;
  slot.style.transform=`translateY(${pos*SLOT_H_EM}em) rotateX(${pos*-18}deg) scale(${sc})`;
  slot.style.opacity=op;
  if(!animate){slot.offsetHeight;slot.style.transition='';}
}
function fillSlot(slot,word,langIdx){
  langs.forEach((lang,li)=>{
    slot.children[li].textContent=word[lang]||'';
    slot.children[li].classList.toggle('wrap',!!word.wrap);
    slot.children[li].classList.toggle('active',li===langIdx);
  });
}
function streamEntry(i,n){
  const L=langs.length,period=n*L;
  const t=((i%period)+period)%period;
  return{wordIdx:t%n,langIdx:Math.floor(t/n)};
}
function drumRollDown(b){
  b.streamHead++;
  const exitIdx=b.drumPos.indexOf(1);
  const exitSlot=b.slots[exitIdx];
  const entry=streamEntry(b.streamHead+1,b.n);
  fillSlot(exitSlot,b.words[entry.wordIdx],entry.langIdx);
  setDrumPos(exitSlot,-2,false);
  b.drumPos=b.drumPos.map((p,i)=>i===exitIdx?-1:p+1);
  b.slots.forEach((s,i)=>setDrumPos(s,b.drumPos[i],true));
}

/* ══════════════════════════════════════════════════════
   DRUM BLOCK — игровой барабан из 4-х секций
   ══════════════════════════════════════════════════════ */
function buildDrumBlock(){
  /* пул слов из глав 4–9 */
  const pool=[];
  groups.slice(3).forEach(g=>g.words.forEach(w=>pool.push({word:w,g})));

  const REQUIRED=3; /* минимум прокруток */
  const N=5;        /* слотов в кольцевом буфере */

  const sec=document.createElement('section');
  sec.className='block drum-block';
  setPal(sec,groups[3]);
  sec.appendChild(blobField());
  cursor(sec);

  /* тинт — плавная смена цветового акцента */
  const tint=document.createElement('div');tint.className='drum-tint';
  sec.appendChild(tint);

  const cap=document.createElement('div');cap.className='theme';
  cap.innerHTML='<span class="num">04</span>слова';
  sec.appendChild(cap);

  const frame=document.createElement('div');frame.className='drum-frame';
  const vp=document.createElement('div');vp.className='drum-viewport';

  /* 5 слотов в кольцевом буфере; позиции: -2,-1,0(центр/победитель),+1,+2 */
  const slots=[];
  const pos=[-2,-1,0,1,2];
  const slotEntries=[];
  for(let i=0;i<N;i++){
    const s=document.createElement('div');s.className='drum-slot';
    slots.push(s);vp.appendChild(s);
  }

  /* перемешанный пул */
  let shuffled=[...pool];
  function shuffle(){for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}}
  shuffle();
  let ptr=0;
  function next(){if(ptr>=shuffled.length){shuffle();ptr=0;}return shuffled[ptr++];}

  /* позиционирование слота: 4 видимые секции (-2,-1,0,+1) + тень (+2) */
  function applySlot(slot,p,animate){
    if(!animate)slot.style.transition='none';
    const absP=Math.abs(p);
    let sc,op,rx;
    if(absP<0.01){sc=1.0;op=1.0;rx=0;}
    else if(absP<=1){sc=0.63;op=0.28;rx=-p*17;}
    else{sc=0.35;op=0.09;rx=-p*30;}
    slot.style.transform=`translateY(${p*SLOT_H_EM}em) rotateX(${rx}deg) scale(${sc})`;
    slot.style.opacity=op;
    if(!animate){slot.offsetHeight;slot.style.transition='';}
  }

  /* инициализировать слоты начальными словами */
  for(let i=0;i<N;i++){
    const e=next();slotEntries.push(e);
    slots[i].textContent=e.word.ru;
    applySlot(slots[i],pos[i],false);
  }

  frame.appendChild(vp);
  sec.appendChild(frame);

  /* bottom panel — абсолютно поверх блока, не конкурирует с viewport */
  const bottom=document.createElement('div');bottom.className='drum-bottom';

  /* кнопка «Крутить ещё раз» */
  const btn=document.createElement('button');btn.className='drum-btn';
  btn.textContent='Крутить ещё раз';
  bottom.appendChild(btn);

  /* перевод */
  const transEl=document.createElement('div');transEl.className='drum-trans';
  bottom.appendChild(transEl);

  /* точки-счётчик */
  const dotsEl=document.createElement('div');dotsEl.className='drum-dots';
  const dotEls=[];
  for(let i=0;i<REQUIRED;i++){
    const d=document.createElement('div');d.className='drum-dot';
    dotsEl.appendChild(d);dotEls.push(d);
  }
  bottom.appendChild(dotsEl);

  sec.appendChild(bottom);

  /* подсказка «Прокрути вниз» */
  const hintEl=document.createElement('div');hintEl.className='drum-hint';
  hintEl.textContent='Прокрути вниз';
  sec.appendChild(hintEl);

  /* ── состояние ── */
  let spinning=false;
  let spinCount=0;

  /* один шаг барабана вверх — новое слово приходит снизу */
  function tickDrum(){
    for(let i=0;i<N;i++)pos[i]--;
    /* слот вышедший за −3 → переброс на +2 */
    const xi=pos.indexOf(-3);
    if(xi!==-1){
      const e=next();slotEntries[xi]=e;
      slots[xi].textContent=e.word.ru;
      pos[xi]=2;
      applySlot(slots[xi],2,false);
    }
    slots.forEach((s,i)=>{if(i!==xi)applySlot(s,pos[i],true);});
  }

  /* «победитель» — слот на позиции 0 */
  function winnerEntry(){return slotEntries[pos.indexOf(0)];}

  /* применить палитру победителя */
  function applyPalette(){
    const e=winnerEntry();
    setPal(sec,e.g);
    tint.style.background=`radial-gradient(ellipse 130% 80% at 50% 38%, ${e.g.ac}55 0%, transparent 68%)`;
  }

  /* показать/скрыть UI */
  function showResult(){
    const e=winnerEntry();
    const w=e.word;
    transEl.textContent=[w.en,w.ja,w.fr].filter(Boolean).join('  ·  ');
    transEl.classList.add('vis');
    if(spinCount>=REQUIRED)btn.classList.add('vis');
  }
  function hideResult(){
    transEl.classList.remove('vis');
    btn.classList.remove('vis');
  }

  /* запуск прокрутки барабана */
  function spin(){
    if(spinning)return;
    spinning=true;
    hintEl.classList.add('gone');
    hideResult();
    spinCount++;

    /* обновить точки */
    const n=Math.min(spinCount,REQUIRED);
    dotsEl.classList.add('vis');
    dotEls.forEach((d,i)=>d.classList.toggle('on',i<n));

    /* интервалы (мс): разгон → торможение */
    const iv=[55,58,62,68,78,92,115,150,198,258,330,410];
    let s=0;
    function step(){
      tickDrum();
      if(s<iv.length){setTimeout(step,iv[s++]);}
      else{spinning=false;applyPalette();showResult();}
    }
    step();
  }

  btn.addEventListener('click',()=>{
    /* разрешить ещё одну прокрутку; canPass() снова вернёт false до следующего spin */
    spinCount=REQUIRED-1;
    spin();
  });

  /* публичный интерфейс */
  sec._drum={
    spin,
    isSpinning:()=>spinning,
    done:()=>spinCount,
    canPass:()=>!spinning&&spinCount>=REQUIRED,
    reset(){
      spinCount=0;spinning=false;
      transEl.classList.remove('vis');
      btn.classList.remove('vis');
      dotsEl.classList.remove('vis');
      dotEls.forEach(d=>d.classList.remove('on'));
      hintEl.classList.remove('gone');
    },
  };

  return sec;
}

/* ══════════════════════════════════════════════════════
   FUJI WATER BLOCK
   ══════════════════════════════════════════════════════ */
function buildFujiBlock(){
  const WATER_LINE=0.73;
  const sec=document.createElement('section');sec.className='block fuji-block';
  const bg=document.createElement('div');bg.className='fuji-bg';bg.id='fuji-ripple-bg';
  const imgUrl=new URL('fuji.jpg',document.location.href).href;
  bg.style.backgroundImage=`url("${imgUrl}")`;sec.appendChild(bg);
  const pCvs=document.createElement('canvas');pCvs.className='fuji-petal-canvas';sec.appendChild(pCvs);
  const haiku=document.createElement('div');haiku.className='fuji-haiku';
  haiku.innerHTML='<p class="h-line">Весенний дождь…</p><p class="h-line">Под зонтиком гуляют</p><p class="h-line">Вдвоём, под зонтиком.</p><p class="h-author">— Ёса Бусон</p>';
  sec.appendChild(haiku);
  const N_PETALS=25;const petals=[];
  let pCtx,PW,PH,rippleReady=false;
  function initPetals(){
    const r=sec.getBoundingClientRect();
    PW=Math.max(1,Math.floor(r.width));PH=Math.max(1,Math.floor(r.height));
    pCvs.width=PW;pCvs.height=PH;pCtx=pCvs.getContext('2d');
    petals.length=0;for(let i=0;i<N_PETALS;i++)petals.push(spawnPetal(true));
  }
  function spawnPetal(randomY){
    return{x:Math.random()*(PW||800),y:randomY?Math.random()*(PH||600)*0.7:-18,
      vx:0,vy:0.4+Math.random()*0.55,rot:Math.random()*Math.PI*2,
      rv:(Math.random()-0.5)*0.045,sz:5+Math.random()*7,op:0.6+Math.random()*0.4,
      ph:Math.random()*Math.PI*2,dead:false};
  }
  function drawPetal(p){
    pCtx.save();pCtx.globalAlpha=Math.max(0,p.op);pCtx.translate(p.x,p.y);pCtx.rotate(p.rot);
    pCtx.beginPath();pCtx.ellipse(0,0,p.sz,p.sz*0.42,0,0,Math.PI*2);
    const g=pCtx.createRadialGradient(0,0,0,0,0,p.sz);
    g.addColorStop(0,'rgba(255,210,220,1)');g.addColorStop(0.7,'rgba(255,182,193,0.88)');g.addColorStop(1,'rgba(255,160,175,0.3)');
    pCtx.fillStyle=g;pCtx.fill();pCtx.restore();
  }
  function tickPetals(now){
    if(!pCtx)return;pCtx.clearRect(0,0,PW,PH);const waterY=PH*WATER_LINE;
    for(const p of petals){
      if(p.dead){p.op-=0.009;if(p.op<=0)Object.assign(p,spawnPetal(false));else drawPetal(p);continue;}
      p.vx=Math.sin(now*0.0007+p.ph)*0.4+(Math.random()-0.5)*0.1;
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;
      if(p.x<-20)p.x=PW+10;if(p.x>PW+20)p.x=-10;
      if(p.y>=waterY){
        p.dead=true;p.vy=0;p.rv=0;
        if(rippleReady){try{$(bg).ripples('drop',p.x,p.y,20,0.06);}catch(e){}}
      }
      drawPetal(p);
    }
  }
  let rippleInited=false;
  function initRipples(){
    if(rippleInited||typeof $.fn.ripples==='undefined')return;
    try{$(bg).ripples({resolution:512,dropRadius:20,perturbance:0.04,interactive:true});rippleReady=true;rippleInited=true;}
    catch(e){console.warn('jQuery Ripples failed:',e.message);}
  }
  let running=false,raf=null;
  function start(){if(running)return;running=true;initPetals();initRipples();(function loop(){if(!running)return;tickPetals(performance.now());raf=requestAnimationFrame(loop);})();}
  function stop(){running=false;if(raf){cancelAnimationFrame(raf);raf=null;}if(rippleInited){try{$(bg).ripples('pause');}catch(e){}}}
  const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){start();if(rippleInited){try{$(bg).ripples('play');}catch(e){}}}else stop();});},{threshold:0.05});
  io.observe(sec);
  window.addEventListener('resize',()=>{if(running)initPetals();if(rippleInited){try{$(bg).ripples('updateSize');}catch(e){}};},{passive:true});
  return sec;
}

/* ── Сборка блоков 1–3 ── */
const BS=[];
groups.forEach((g,gi)=>{
  if(gi>=3)return; /* главы 4–9 → барабан */
  const n=g.words.length;
  const isCarousel=n>1;
  const block=document.createElement('section');
  block.className='block'+(isCarousel?' multi':'');
  setPal(block,g);block.appendChild(blobField());
  const cap=document.createElement('div');cap.className='theme';
  cap.innerHTML=`<span class="num">${String(g.chapter).padStart(2,'0')}</span>${g.theme}`;
  block.appendChild(cap);
  const stage=document.createElement('div');stage.className='stage';
  let slots,drumPos,streamHead=0;
  if(isCarousel){
    slots=[makeWordStack(),makeWordStack(),makeWordStack()];drumPos=[-1,0,1];
    drumPos.forEach((p,i)=>{const e=streamEntry(-p,n);fillSlot(slots[i],g.words[e.wordIdx],e.langIdx);setDrumPos(slots[i],p,false);stage.appendChild(slots[i]);});
  }else{
    const s=makeWordStack();fillSlot(s,g.words[0],0);setDrumPos(s,0,false);stage.appendChild(s);
    slots=[s];drumPos=[0];
    if(g.words[0].wrap)stage.style.fontSize='clamp(4.4rem, 7.5vw, 7.8rem)';
  }
  block.appendChild(stage);cursor(block);app.appendChild(block);
  BS.push({slots,words:g.words,n,streamHead,drumPos});
  if(gi===2)app.appendChild(buildFujiBlock());
});

/* ── Глобальный таймер (блоки 1–3) ── */
let tick=0;
function applyTick(){
  BS.forEach(b=>{
    if(b.slots.length>1){if(tick>0)drumRollDown(b);}
    else{
      const li=tick%langs.length;
      for(let j=0;j<b.slots[0].children.length;j++)
        b.slots[0].children[j].classList.toggle('active',j===li);
    }
  });
}
applyTick();
setInterval(()=>{tick++;applyTick();},TICK_MS);

/* ── Nav dots ── */
const blocks=Array.from(document.querySelectorAll('.block'));
const dotsNav=document.getElementById('dots');
blocks.forEach((_,i)=>{
  const d=document.createElement('button');d.type='button';
  d.setAttribute('aria-label','К сцене '+(i+1));
  d.addEventListener('click',()=>goTo(i));
  dotsNav.appendChild(d);
});

let curIdx=0,lock=false;
function setCur(i){
  curIdx=i;
  const b=dotsNav.children;
  for(let j=0;j<b.length;j++)b[j].classList.toggle('current',j===i);
}
setCur(0);

const drumIdx=blocks.indexOf(drumSec);

function goTo(i){
  i=Math.max(0,Math.min(blocks.length-1,i));
  if(i===curIdx||lock)return;
  const prev=curIdx;
  lock=true;
  blocks[i].scrollIntoView({behavior:'smooth',block:'start'});
  setCur(i);
  setTimeout(()=>{lock=false;},850);
  /* при уходе с барабана — сбросить состояние */
  if(prev===drumIdx&&i!==drumIdx)drumSec._drum.reset();
  /* при входе на барабан — автоматический первый spin */
  if(i===drumIdx&&drumSec._drum.done()===0)
    setTimeout(()=>drumSec._drum.spin(),680);
}
function step(d){goTo(curIdx+d);}

/* ── Wheel ── */
window.addEventListener('wheel',e=>{
  e.preventDefault();
  if(lock)return;
  if(Math.abs(e.deltaY)<4)return;

  if(curIdx===drumIdx){
    if(e.deltaY>0){
      /* вниз: крутить барабан или пропустить на следующий слайд */
      if(drumSec._drum.canPass()){step(1);}
      else if(!drumSec._drum.isSpinning()){drumSec._drum.spin();}
    }else{step(-1);}
    return;
  }
  step(e.deltaY>0?1:-1);
},{passive:false});

window.addEventListener('keydown',e=>{
  if(['ArrowDown','PageDown',' '].includes(e.key)){e.preventDefault();step(1);}
  else if(['ArrowUp','PageUp'].includes(e.key)){e.preventDefault();step(-1);}
  else if(e.key==='Home'){e.preventDefault();goTo(0);}
  else if(e.key==='End'){e.preventDefault();goTo(blocks.length-1);}
});

/* ── Touch ── */
let ty=null;
window.addEventListener('touchstart',e=>{ty=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchend',e=>{
  if(ty===null)return;
  const d=ty-e.changedTouches[0].clientY;
  if(Math.abs(d)>40){
    if(curIdx===drumIdx){
      if(d>0){if(drumSec._drum.canPass())step(1);else if(!drumSec._drum.isSpinning())drumSec._drum.spin();}
      else step(-1);
    }else step(d>0?1:-1);
  }
  ty=null;
},{passive:true});

let st;
window.addEventListener('scroll',()=>{
  clearTimeout(st);
  st=setTimeout(()=>{
    const i=Math.round((window.scrollY||document.documentElement.scrollTop)/window.innerHeight);
    if(i!==curIdx&&!lock)setCur(i);
  },120);
},{passive:true});

const hint=document.querySelector('.scroll-hint');
const hh=()=>hint.style.opacity='0';
window.addEventListener('wheel',hh,{once:true,passive:true});
window.addEventListener('keydown',hh,{once:true});
window.addEventListener('touchstart',hh,{once:true,passive:true});
</script>
